<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farsi Grammar Master</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#eef0f8;min-height:100vh;color:#1a1a2e}
#app{max-width:680px;margin:0 auto;padding:16px}

.hdr{background:linear-gradient(135deg,#1a237e 0%,#3949ab 100%);color:#fff;padding:22px 24px;border-radius:14px;text-align:center;margin-bottom:18px;box-shadow:0 4px 16px rgba(26,35,126,.25)}
.hdr h1{font-size:1.6rem;letter-spacing:.5px}
.hdr .sub{opacity:.75;font-size:.85rem;margin-top:4px}

.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.07)}

.btn{display:inline-block;padding:11px 22px;border:none;border-radius:9px;cursor:pointer;font-size:.95rem;font-weight:600;transition:all .18s;text-align:center}

.btn-block{display:block;width:100%;margin-bottom:10px;padding:13px 22px;font-size:1rem}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}

.prog-wrap{background:#e0e0e0;border-radius:5px;height:7px;margin-bottom:18px;overflow:hidden}
.prog-fill{background:linear-gradient(90deg,#1a237e,#5c6bc0);height:7px;border-radius:5px;transition:width .3s}

.topic-row{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border:2px solid #e8eaf6;border-radius:9px;margin-bottom:8px;cursor:pointer;background:#fff;transition:all .18s}

.lesson-body{line-height:1.65;color:#222;font-size:.92rem}
.lesson-body p{margin-bottom:11px}

.tip strong{color:#1565c0}
.warn{background:#fff3e0;border-left:4px solid #e65100;padding:10px 14px;border-radius:0 9px 9px 0;margin:10px 0;font-size:.87rem}

.ex-type{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}

.feedback-expl{margin-top:6px;font-size:.83rem;color:#555;font-weight:400}

.result-circle{width:130px;height:130px;border-radius:50%;background:linear-gradient(135deg,#1a237e,#3949ab);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px}
.result-pct{font-size:2.2rem;font-weight:800}
.result-frac{font-size:.85rem;opacity:.8}
.result-msg{text-align:center;font-size:1rem;color:#555;margin-bottom:20px}

.prog-row{padding:11px 14px;border-radius:9px;margin-bottom:8px;background:#fff;border:1px solid #e8eaf6}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}

.stat-l{font-size:.75rem;color:#666;margin-top:2px}

.section-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#888;margin-bottom:12px}
.back-btn{background:none;border:none;color:#1a237e;font-size:.9rem;font-weight:600;cursor:pointer;padding:0;margin-bottom:14px;display:flex;align-items:center;gap:5px}
.back-btn:hover{text-decoration:underline}
.q-counter{font-size:.8rem;color:#888;margin-bottom:6px}

<div id="app"></div>
<script>
function mc(p,a,w,h='',e=''){return{kind:'mc',prompt:p,answer:a,choices:[...w,a],hint:h,expl:e}}
function fill(p,a,h='',e=''){return{kind:'fill',prompt:p,answer:a,hint:h,expl:e}}
function scr(p,a,h='',e=''){return{kind:'scr',prompt:p,answer:a,hint:h,expl:e}}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b}
function normalize(s){return s.toLowerCase().trim().replace(/[?.!,]/g,'').replace(/[âÂ]/g,'a').replace(/[ôÔ]/g,'o').replace(/[îÎ]/g,'i').replace(/[ûÛ]/g,'u').replace(/[éÉ]/g,'e').replace(/'/g,'').replace(/-/g,'').replace(/\s+/g,'')}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

let progress={};
try{progress=JSON.parse(localStorage.getItem('farsi_grammar')||'{}')}catch(e){}
function saveProgress(){try{localStorage.setItem('farsi_grammar',JSON.stringify(progress))}catch(e){}}

let S={screen:'menu',topicIdx:0,exercises:[],exIdx:0,score:0,mode:'study',answered:false,correct:false,choices:[],chosenMC:'',fillVal:'',pool:[],built:[]};

// ══════════════════════════════════════════════════════════════
// TOPICS
// ══════════════════════════════════════════════════════════════
const TOPICS=[

{name:"1. Personal Pronouns",
lesson:`<p>🎉 <strong>Great news to start with:</strong> Farsi pronouns are dramatically simpler than most European languages. No gendered forms, no case changes — just six clean words.</p>
<div class="conj">  man    = I              mâ     = we
  to     = you (informal) shomâ  = you (pl. / formal)
  u      = he / she / it  ânhâ   = they</div>
<div class="fun">🌍 <strong>Zero grammatical gender!</strong> The word <em>u</em> means he, she, AND it — all in one. No more agonising over der/die/das or il/elle/lo!</div>
<div class="tip">💡 <strong>shomâ</strong> is your polite 'you' — use it with strangers, bosses, and elders. <strong>to</strong> is reserved for close friends, family, and children.</div>
<div class="tip">💡 <strong>Pro tip:</strong> You can drop the subject pronoun entirely! The verb ending already tells you who did it. <em>miravam</em> on its own means "I go" — adding <em>man</em> is just for emphasis.</div>`,
exercises:[
  mc("What does 'u' mean in Farsi?","he / she / it",["I","we","you (formal)"]),
  mc("How do you say 'we'?","mâ",["man","to","u"]),
  mc("Which pronoun covers both plural and formal 'you'?","shomâ",["to","u","ânhâ"]),
  fill("'They went.' — fill in the subject pronoun: ___ raftand","ânhâ","3rd person plural"),
  mc("'to' is used for:","informal singular you",["formal you","they","I"]),
  fill("Farsi has ___ grammatical genders.","0","","Farsi has NO grammatical gender. 'u' = he, she, and it."),
  mc("When can subject pronouns be omitted?","always — the verb ending shows the subject",["never","only in past tense","only 'man'"]),
]},

{name:"2. To Be — Present (hastan)",
lesson:`<p>🔑 <strong>'To be' is the most-used verb in any language</strong>, so let's nail it first. The Farsi verb <em>hastan</em> is beautifully regular.</p>
<div class="conj">  hastam  = I am          hastim  = we are
  hasti   = you are       hastid  = you (pl.) are
  ast     = he/she/it is  hastand = they are</div>
<div class="warn">⚠️ <strong>Negative:</strong> Don't add 'na-' here — instead, swap the whole stem. Replace <strong>hast-</strong> with <strong>nist-</strong> and you're done:
  nistam / nisti / nist / nistim / nistid / nistand</div>
<div class="tip">💡 <strong>Shortcut — enclitic forms:</strong> In practice, 'to be' often shrinks to a tiny suffix glued onto the predicate:
  man <strong>khub-am</strong>  = I am well  (khub + -am)
  to  <strong>khub-i</strong>   = you are well
  u   <strong>khub-ast</strong> = he/she is well
  These short forms are everywhere in everyday speech!</div>`,
exercises:[
  mc("'I am' in Farsi:","hastam",["hasti","ast","nistam"]),
  mc("'They are' in Farsi:","hastand",["hastim","hastid","hasti"]),
  mc("'He is not' in Farsi:","nist",["ast","hastam","nabud"]),
  fill("'We are not' = nist___","im","","nistim = we are not"),
  fill("'You (pl.) are' = hast___","id"),
  mc("The enclitic 'I am' attached to a predicate:","khub-am",["khub-ast","khub-i","khub-im"]),
  fill("'They are not' = nist___","and","","nistand"),
]},

{name:"3. To Be — Past (budan)",
lesson:`<p>✅ <strong>Fantastic news:</strong> the past of 'to be' is perfectly regular — just learn the six endings and you're set.</p>
<div class="conj">  budam  = I was       budim  = we were
  budi   = you were    budid  = you (pl.) were
  bud    = he/she was  budand = they were</div>
<div class="tip">💡 <strong>Memory trick:</strong> the endings here (-am, -i, Ø, -im, -id, -and) are the same personal endings you'll see throughout Farsi. Learn them once, use them everywhere!</div>
<div class="warn">⚠️ <strong>Negative:</strong> Stick <strong>na-</strong> on the front:
  nabudam, nabudi, nabud, nabudim, nabudid, nabudand</div>
<div class="eg">u xaste bud.       → He/she was tired.
mâ khâne nabudim.  → We were not at home.
hava sard bud.     → The weather was cold.</div>`,
exercises:[
  mc("'She was' in Farsi:","bud",["budam","budi","budand"]),
  mc("'We were not' in Farsi:","nabudim",["nabudi","nabudand","nistim"]),
  fill("'I was tired' = man xaste ___","budam"),
  mc("'They were' in Farsi:","budand",["budim","budid","budan"]),
  fill("'You were not' = na___i","bud","","nabudi = you were not"),
  mc("Past negative of 'to be' uses prefix:","na-",["ne-","bi-","be-"]),
  fill("'He was not here' = u injâ na___","bud"),
]},

{name:"4. Plural Formation",
lesson:`<p>📦 <strong>Two plural suffixes</strong> to know — and a twist that catches every beginner off guard.</p>
<div class="conj">  -hâ  : everyday plural (the one you'll use most)
           ketâb  → ketâb-hâ   (books)
           miz    → miz-hâ     (tables)

  -ân  : formal / literary, often used for people
           mard       → mard-ân        (men)
           dâneshju   → dâneshju-yân   (students)  ← -yân after a vowel</div>
<div class="warn">⚠️ <strong>The twist — no plural after numbers!</strong> This is the opposite of English.
  ✅  se ketâb    = three books     (singular after number)
  ❌  se ketâb-hâ = WRONG
  ✅  dah nafar   = ten people</div>
<div class="fun">🤓 <strong>Fun fact:</strong> Farsi uses -hâ for almost anything — even borrowed words. You'll hear <em>kompyuter-hâ</em> (computers) and <em>sandvich-hâ</em> (sandwiches) all the time.</div>`,
exercises:[
  mc("Plural of 'ketâb' (book) in everyday speech:","ketâb-hâ",["ketâb-ân","ketâbim","ketâbid"]),
  fill("'dogs' = sag-___","hâ"),
  mc("Which is CORRECT for 'two books'?","do ketâb",["do ketâb-hâ","do ketâb-ân","ketâb-hâ do"]),
  mc("Formal/literary plural of 'mard' (man):","mard-ân",["mard-hâ","mard-im","mard-id"]),
  fill("'students' (formal) = dâneshju-___","yân","-yân after a vowel"),
  mc("After numbers in Farsi, use:","the singular form",["-hâ plural","-ân plural","either plural"]),
  fill("'cities' = shahr-___","hâ"),
]},

{name:"5. Ezafe Construction",
lesson:`<p>🔗 <strong>Meet ezafe</strong> — arguably the most fascinating feature of Farsi grammar. It's an invisible linking vowel that connects a noun to everything that follows it.</p>
<div class="conj">  noun + adjective:   ketâb-<strong>e</strong> khub     → a good book
  noun + noun:        dar-<strong>e</strong> khâne      → door of the house
  noun + possessor:   mâdar-<strong>e</strong> Ali      → Ali's mother</div>
<div class="tip">💡 <strong>The pronunciation rule:</strong>
  After a <strong>consonant</strong> → <strong>-e</strong>  (ketâb-e, mard-e)
  After a <strong>vowel</strong>     → <strong>-ye</strong> (khâne-ye, dâneshgâh-ye)</div>
<div class="fun">🤫 <strong>Mind-blowing:</strong> Ezafe is <em>never written</em> in standard Farsi script! Readers just know it's there from context. You'll only see it spelled out in learning materials.</div>
<div class="warn">⚠️ <strong>Remember:</strong> adjectives go AFTER the noun in Farsi, linked by ezafe — the opposite of English! <em>khub ketâb</em> sounds as wrong to a Persian speaker as "book good" does to you.</div>`,
exercises:[
  mc("'A good book' in Farsi:","ketâb-e khub",["khub ketâb","ketâb khub","khub-e ketâb"]),
  fill("'The door of the house' = dar-e ___","khâne"),
  mc("After a vowel, the ezafe becomes:","-ye",["-e","-i","-â"]),
  fill("'Ali's mother' = mâdar-___ Ali","e","","After a consonant: -e"),
  mc("'A big house' = ?","khâne-ye bozorg",["bozorg khâne","khâne bozorg","bozorg-e khâne"]),
  mc("Ezafe is used to:","link a noun to what follows it",["mark the direct object","mark the subject","form plurals"]),
  fill("'The color of the sky' = rang-e ___","âsmân"),
]},

{name:"6. Adjectives",
lesson:`<p>🔄 <strong>Flip your instincts!</strong> In English you say "a <u>big</u> house." In Farsi, the house comes first and the adjective follows via ezafe — "house-of big."</p>
<div class="conj">  ketâb-e bozorg    = a big book       (NOT: bozorg ketâb ❌)
  mard-e khub       = a good man
  dokhtar-e bâhush  = an intelligent girl</div>
<div class="fun">🌟 <strong>No agreement needed!</strong> Farsi adjectives <em>never</em> change for gender or number. The same word works for a big man, big woman, and big houses. No declension tables!</div>
<div class="tip">💡 <strong>Stack adjectives</strong> by adding another ezafe:
  ketâb-e khub-e jadid = a good new book  (each adjective chained on)</div>
<div class="tip">💡 <strong>Comparatives & superlatives:</strong>
  bozorg → bozorg-<strong>tar</strong> (bigger) → bozorg-<strong>tarin</strong> (biggest)
  Superlatives jump to the front: <em>khub-tarin ketâb</em> = the best book</div>`,
exercises:[
  mc("'A big house' in Farsi:","khâne-ye bozorg",["bozorg khâne","bozorg-e khâne","khâne bozorg"]),
  fill("'A beautiful girl' = dokhtar-e ___","zibâ","zibâ = beautiful"),
  mc("Adjectives in Farsi agree with nouns in:","nothing — no agreement",["gender","number","both"]),
  fill("'bigger' = bozorg___","tar"),
  mc("'The best book' = ?","khub-tarin ketâb",["ketâb-e khub-tarin","ketâb khub-tarin","khub-tar ketâb"]),
  mc("Where does the adjective go?","after the noun, with ezafe",["before the noun","before the verb","at the end"]),
  fill("'A new red car' = mâshin-e qermez-e ___","jadid","jadid = new"),
]},

{name:"7. Possessive Suffixes",
lesson:`<p>📎 <strong>Stick-on ownership!</strong> Instead of separate words like "my" or "his", Farsi glues tiny suffixes directly onto the noun. It's compact and elegant.</p>
<div class="conj">  -am    = my         -emân  = our
  -at    = your       -etân  = your (pl./formal)
  -ash   = his/her    -eshân = their</div>
<div class="eg">ketâb-am   = my book       ketâb-at   = your book
ketâb-ash  = his/her book  ketâb-emân = our book</div>
<div class="tip">💡 <strong>After a vowel</strong> the rules are the same — just attach directly:
  khâne-am (my house),  khâne-at (your house),  khâne-ash (his/her house)</div>
<div class="tip">💡 <strong>Want to emphasise?</strong> Use ezafe + full pronoun instead:
  <em>ketâb-e MAN</em> = MY book (stressing who it belongs to)</div>
<div class="fun">🎯 <strong>Cool:</strong> The suffix <em>-ash</em> covers both "his" and "her" since Farsi has no gender. Half the work of English in one syllable!</div>`,
exercises:[
  mc("'My book' in Farsi:","ketâb-am",["ketâb-at","ketâb-ash","ketâb-emân"]),
  fill("'his/her mother' = mâdar-___","ash"),
  mc("'our house' = ?","khâne-emân",["khâne-am","khâne-eshân","khâne-etân"]),
  fill("'your (pl./formal) friend' = doost-___","etân"),
  mc("'their book' = ?","ketâb-eshân",["ketâb-emân","ketâb-etân","ketâb-ash"]),
  fill("'my name' = esm-___","am"),
  mc("'your (informal) house' = ?","khâne-at",["khâne-am","khâne-ash","khâne-etân"]),
]},

{name:"8. Object Marker râ",
lesson:`<p>🎯 <strong>râ is the spotlight.</strong> When you're talking about a <em>specific, definite</em> thing, Farsi shines a light on it with <strong>râ</strong> placed right after the noun.</p>
<div class="conj">  ketâb râ khândam.   = I read THE book.      (the specific one)
  u râ didam.         = I saw HIM / HER.      (that person)
  Ali râ shenâkhtam.  = I recognized Ali.     (Ali specifically)</div>
<div class="warn">⚠️ <strong>No râ for indefinite objects!</strong>
  ketâb<strong>i</strong> khândam.  = I read A book.   (some book, no râ)
  film didam.          = I watched a film.    (just some film)</div>
<div class="tip">💡 <strong>Colloquial shortcut:</strong> In spoken Farsi, <em>râ</em> shrinks to <strong>-o</strong> or <strong>-ro</strong> glued onto the noun:
  <em>ketâb-o khândam</em>  (spoken)  vs.  <em>ketâb râ khândam</em>  (written/formal)</div>
<div class="fun">🤩 <strong>Why does this matter?</strong> râ is one of the things that makes Farsi feel logical — you always know from râ whether the speaker means "the" or "a"!</div>`,
exercises:[
  mc("'I read the book' (definite):","ketâb râ khândam",["ketâbi khândam","ketâb khândam","râ ketâb khândam"]),
  mc("'I read a book' (indefinite):","ketâbi khândam",["ketâb râ khândam","ketâb khândam","râ ketâbi khândam"]),
  fill("'I saw him/her' = u ___ didam","râ"),
  mc("'râ' marks objects that are:","definite or specific",["indefinite","plural only","animate only"]),
  fill("'She called me' = u man ___ sedâ zad","râ"),
  mc("In colloquial speech, râ often becomes:","-o or -ro attached to noun",["disappears entirely","-râ attached to verb","-i suffix"]),
  mc("Which is correct for 'He loves her'?","u râ dust dârad",["u dust dârad","dust dârad u","u dust dârad râ"]),
]},

{name:"9. Prepositions",
lesson:`<p>📍 <strong>Prepositions — the location words.</strong> Farsi has a neat set of basic ones, plus a whole family of spatial prepositions that use <em>ezafe</em> to connect to the noun.</p>
<div class="conj">  Basic (before the noun):
  dar = in/at    be = to     az = from/of   bâ = with
  barâye = for   tâ = until  bedune = without

  Spatial (use ezafe to link):
  ruy-e  = on top of    zir-e   = under
  kenâr-e = beside      jelo-ye = in front of
  posht-e = behind      tu-ye   = inside of
  birun-e = outside of  miân-e  = between</div>
<div class="tip">💡 <strong>Spot the pattern:</strong> All those spatial prepositions end in <strong>-e</strong> — that's the ezafe! So <em>ruy-e miz</em> literally means "the top of the table" → "on the table."</div>
<div class="eg">dar khâne     = in the house       be madrese  = to school
ruy-e miz     = on the table       zir-e sandalí = under the chair
bâ doost-am   = with my friend     barâye to     = for you</div>`,
exercises:[
  mc("'in the house' = ?","dar khâne",["be khâne","az khâne","bâ khâne"]),
  mc("'to school' = ?","be madrese",["dar madrese","az madrese","barâye madrese"]),
  fill("'from Tehran' = ___ Tehrân","az"),
  mc("'on the table' = ?","ruy-e miz",["dar miz","zir-e miz","be miz"]),
  fill("'with my friend' = ___ doost-am","bâ"),
  mc("'for you' = ?","barâye to",["bâ to","az to","dar to"]),
  fill("'under the chair' = ___ sandali","zir-e"),
]},

{name:"10. SOV Word Order",
lesson:`<p>🔀 <strong>Yoda speaks Farsi.</strong> While English is Subject–Verb–Object (SVO), Farsi is <strong>Subject–Object–Verb</strong> (SOV). The verb always waits at the end of the sentence.</p>
<div class="conj">  English (SVO):  I        read       the book.
  Farsi   (SOV):  man      ketâb râ   khândam.
                  Subject  Object     Verb ← always last!</div>
<div class="eg">Ali mâdar-ash râ dust dârad.  → Ali loves his mother.
u be mâdrese raft.             → He/she went to school.
mâ diruz film didim.           → We watched a film yesterday.</div>
<div class="warn">⚠️ <strong>Don't let English habits sneak in!</strong> Even in long sentences with multiple clauses, the main verb sits at the very end. It's like the sentence is building up to a reveal.</div>
<div class="fun">🎬 <strong>Fun consequence:</strong> In Farsi films and conversations, you often don't know <em>what</em> someone did until the very last word of the sentence — great for suspense!</div>`,
exercises:[
  scr("Arrange into a correct Farsi sentence:","man ketâb râ khândam","Subject – Object – Verb"),
  mc("In Farsi, the verb goes:","at the end of the sentence",["at the start","right after the subject","anywhere"]),
  scr("Arrange into a correct Farsi sentence:","Ali be mâdrese raft"),
  fill("'She reads the newspaper.' What word comes last?\n  u ruzname râ ___","mikhânad"),
  mc("Which has correct Farsi word order?","man âb râ khordam",["man khordam âb râ","khordam man âb râ","âb man râ khordam"]),
  scr("Arrange into a correct Farsi sentence:","mâ diruz film didim"),
  mc("'Ali saw Sara' in Farsi:","Ali Sârâ râ did",["Ali did Sârâ râ","did Ali Sârâ râ","Sârâ râ did Ali"]),
]},

{name:"11. Present Tense",
lesson:`<p>🚀 <strong>The <em>mi-</em> prefix is your best friend.</strong> Every present tense verb in Farsi starts with <strong>mi-</strong> — it's like a little flag that says "happening now!"</p>
<div class="conj">  Formula:  mi-  +  PRESENT STEM  +  personal ending
  Endings:  -am, -i, -ad, -im, -id, -and</div>
<div class="conj">  Infinitive → Present Stem → Example (I / she / they)
  kardan  (to do)   → kon  → mikonam  / mikonad  / mikonand
  raftan  (to go)   → rav  → miravam  / miravad  / miravand
  khândan (to read) → khân → mikhânam / mikhânad / mikhânand
  didan   (to see)  → bin  → mibinam  / mibinad  / mibinand
  âmadan  (to come) → â   → miâyam   / miâyad   / miâyand</div>
<div class="tip">💡 <strong>Cheat code:</strong> The personal endings (-am, -i, -ad, -im, -id, -and) are the same across almost every tense. Master them once and they serve you forever.</div>
<div class="fun">🎵 <strong>mi- also expresses habit:</strong> <em>har ruz mikhânam</em> = "I read every day." One prefix covers both present continuous and simple present!</div>`,
exercises:[
  mc("'I go' in Farsi:","miravam",["mikonam","miraftam","beravad"]),
  mc("'She reads' in Farsi:","mikhânad",["mikhânid","mikhânam","mikhândam"]),
  fill("'We do' = mi___im","kon","","mikonim"),
  mc("'They come' in Farsi:","miâyand",["miâyim","miâyad","miâyam"]),
  fill("'You (inf.) see' = mi___i","bini","","mibini"),
  mc("The 'mi-' prefix marks:","present / habitual tense",["past tense","future tense","subjunctive"]),
  fill("'I say' = mi___am","guy","","miguyam"),
]},

{name:"12. Negation",
lesson:`<p>🚫 <strong>Good news: negation is consistent and logical.</strong> There are essentially two prefixes to learn — <strong>ne-</strong> for present and <strong>na-</strong> for everything else.</p>
<div class="conj">  Present — ne- REPLACES mi- (notice the spelling change!):
    mikonam  → ne-mikonam   (I don't do)
    miravam  → ne-miravam   (I don't go)

  Past — na- before the verb stem:
    raftam   → na-raftam    (I didn't go)
    kard     → na-kard      (he/she didn't do)

  To be — special forms (just memorise):
    hastam → nistam    nabud → nabud

  Imperative — na- WITHOUT be-:
    boro! → naro!    bekon! → nakon!</div>
<div class="tip">💡 <strong>Memory trick:</strong> <strong>ne-</strong> swaps with <strong>mi-</strong> in present tense. Think of them as rivals fighting for the same spot at the start of the verb.</div>
<div class="fun">🎉 <strong>Unlike English,</strong> Farsi never needs "do/does/did" in questions or negatives. <em>naraftam</em> is just one word for "I didn't go." Clean and simple!</div>`,
exercises:[
  mc("'I don't go' in Farsi:","nemiravam",["naraftam","miravam na","bemiravam"]),
  mc("'She didn't do' in Farsi:","nakard",["nemikonad","kard na","nakonad"]),
  fill("'We don't read' = ne___im","mikhân","","nemikhânim"),
  mc("'Don't go!' (negative imperative):","naro!",["nabaro!","nemiro!","naborid!"]),
  fill("'He was not' = na___","bud","","nabud"),
  mc("Present tense negation prefix:","ne- (replaces mi-)",["na-","bi-","nist-"]),
  fill("'I didn't see' = na___am","did","","nadidam"),
]},

{name:"13. Past Tense",
lesson:`<p>✂️ <strong>The easiest past tense you'll ever learn.</strong> Just chop <em>-an</em> off the infinitive and add a personal ending. That's genuinely it.</p>
<div class="conj">  Infinitive  →  Past Stem   (remove -an)
  kardan      →  kard        raftan  → raft
  khândan     →  khând       didan   → did
  goftan      →  goft        âmadan  → âmad

  Personal endings: -am, -i, Ø (3rd sg!), -im, -id, -and
  raftam, rafti, raft, raftim, raftid, raftand</div>
<div class="warn">⚠️ <strong>3rd person singular is BARE</strong> — no ending at all:
  raft = he went / she went / it went  (just the stem, nothing added)</div>
<div class="tip">💡 <strong>Negative:</strong> Stick <strong>na-</strong> on front: <em>naraftam</em> (I didn't go), <em>nakard</em> (he/she didn't do).</div>
<div class="fun">🏆 <strong>The past tense is the most common tense in Farsi storytelling.</strong> Master it and you can narrate everything that happened on your day — which is most of what people talk about!</div>`,
exercises:[
  mc("'She went' in Farsi:","raft",["raftam","raftid","rafti"]),
  mc("'We did' in Farsi:","kardim",["kardam","kardand","kardid"]),
  fill("'They read' = khând___","and","","khândand"),
  mc("'I didn't come' in Farsi:","nayâmadam",["namiâyam","nayâmad","nemiâmadam"]),
  fill("'You (inf.) saw' = did___","i","","didi"),
  mc("Past stem of 'goftan' (to say):","goft",["gu","guf","gofte"]),
  fill("'He didn't do' = na___","kard","","nakard"),
]},

{name:"14. Future Tense",
lesson:`<p>🔭 <strong>The future tense exists… but most Farsi speakers barely use it in conversation.</strong> It sounds a bit formal. Still, you need to know it!</p>
<div class="conj">  Formula: conjugated khâstan (no mi-)  +  past stem of main verb

  khâham / khâhi / khâhad / khâhim / khâhid / khâhand

  khâham raft    = I will go
  khâhad kard    = he/she will do
  khâhim khând   = we will read
  khâhand did    = they will see</div>
<div class="tip">💡 <strong>Negative:</strong> na- before khâh-: <em>nakhâham raft</em> = I will not go</div>
<div class="fun">😎 <strong>Real-life shortcut:</strong> In everyday speech, Farsi speakers use the <strong>present tense</strong> for near future — just like English "I'm leaving tomorrow":
  <em>fardâ miram</em> = I'm going tomorrow  (lit. tomorrow I go)
  You'll sound more natural using this than the formal future!</div>`,
exercises:[
  mc("'I will go' in Farsi:","khâham raft",["khâham raftan","miravam","beravad"]),
  mc("'She will do' in Farsi:","khâhad kard",["khâhim kard","khâhad kardan","mikonad"]),
  fill("'We will read' = khâhim ___","khând"),
  mc("'I will not go' in Farsi:","nakhâham raft",["nemiravam","namiravad","benaravam"]),
  fill("'They will see' = khâh___ did","and","","khâhand did"),
  mc("In spoken Farsi, near future is often expressed with:","present tense",["a special future suffix","past tense","subjunctive only"]),
  fill("'You will do' = khâh___ kard","i","","khâhi kard"),
]},

{name:"15. Subjunctive Mood",
lesson:`<p>🌀 <strong>The subjunctive sounds scary but is really just 'be-' + stem.</strong> It's the verb form you use after "I want", "must", "maybe" — for anything uncertain, desired, or hypothetical.</p>
<div class="conj">  Formula:  be-  +  PRESENT STEM  +  personal endings
  Endings:  -am, -i, -ad, -im, -id, -and

  kardan → be-kon: bekonam, bekoni, bekonad...
  raftan → be-rav: beravam, beravi, beravad...
  âmadan → bi-yâ: biyâyam, biyâyi, biyâyad...</div>
<div class="conj">  Triggers (verbs/words that require subjunctive after them):
  mikhâham  (I want):  mikhâham bekonam   → I want to do it
  bâyad     (must):    bâyad beravi        → you must go
  shâyad    (maybe):   shâyad biyâyad      → he/she might come
  tâ        (so that): mikonam tâ biyâyi   → I'll do it so you come</div>
<div class="tip">💡 <strong>Negative subjunctive:</strong> Drop the <em>be-</em> and add <em>na-</em>: <em>nakonam</em> (that I not do), <em>naravam</em> (that I not go).</div>`,
exercises:[
  mc("'that I do' (subjunctive):","bekonam",["mikonam","konam","bekonid"]),
  mc("'you must go' = bâyad ___:","beravi",["miravi","raftam","beravid"]),
  fill("'I want to read' = mikhâham be___am","khân","","mikhâham bekhânam"),
  mc("'maybe he comes' = shâyad ___:","biyâyad",["miâyad","âmad","biyâyid"]),
  fill("Negative subjunctive: drop be-, add ___ before the stem","na-"),
  mc("'bâyad' means:","must / should",["maybe","I want","I can"]),
  fill("'that we not go' = na___im","rav","","naravim"),
]},

{name:"16. Imperative Mood",
lesson:`<p>📣 <strong>Commands in Farsi are satisfyingly simple:</strong> <em>be-</em> turns a stem into a command, and <em>na-</em> turns it into a prohibition.</p>
<div class="conj">  Singular informal:  be- + present stem
    boro!    = go!        bekon!   = do!
    bekhân!  = read!      biyâ!    = come!
    bebin!   = look/see!  bekhâb!  = sleep!

  Plural / formal:  be- + present stem + -id
    borid!    = go!       bekonid!  = do!
    bekhânid! = read!

  Negative:  na- + stem  (NO be-)
    naro! = don't go!    nakon! = don't do!
    nakhân! = don't read!  nayâ! = don't come!</div>
<div class="warn">⚠️ <strong>Common mistake:</strong> Negative commands drop the <em>be-</em>. <em>Nabero!</em> is wrong — <em>naro!</em> is correct.</div>
<div class="fun">🎭 <strong>Cultural note:</strong> Using the formal plural imperative (<em>bekonid!</em>) is a sign of respect. Use singular (<em>bekon!</em>) only with close friends and children — otherwise it can sound rude!</div>`,
exercises:[
  mc("'Go!' (singular informal):","boro!",["naro!","beravad!","raft!"]),
  mc("'Do it!' (plural/formal):","bekonid!",["bekonam!","nakon!","bekonad!"]),
  fill("'Read!' (singular) = be___!","khân","","bekhân!"),
  mc("'Don't come!' (neg. imperative):","nayâ!",["biyâ!","nemiâyi!","nabiyâ!"]),
  fill("'Look / See!' (singular) = be___!","bin","","bebin!"),
  mc("Negative imperative is formed with:","na- + stem (no be-)",["be- + na- + stem","ne- + stem","stem + -ma"]),
  fill("'Don't sleep!' = na___!","khâb","","nakhâb!"),
]},

{name:"17. Progressive Aspect",
lesson:`<p>⏳ <strong>"I am doing" = 'having' + present tense.</strong> To show something is in progress right now, Farsi uses a clever double-verb construction: conjugated <em>dâshtan</em> (to have) + the full present tense verb.</p>
<div class="conj">  dâram  mikonam   = I am doing       (I have doing → I am in the middle of doing)
  dâri   mikoni    = you are doing
  dârad  mikonad   = he/she is doing
  dârim  mikonim   = we are doing
  dârid  mikonid   = you (pl.) are doing
  dârand mikonand  = they are doing</div>
<div class="tip">💡 <strong>Past progressive</strong> — just shift dâshtan to past:
  dâshtam mikardam  = I was doing
  dâsht   miraft    = he/she was going</div>
<div class="tip">💡 <strong>Negative:</strong> negate <em>dâshtan</em>: <em>nadâram miravam</em> = I am not going.</div>
<div class="fun">🤔 <strong>Fun fact:</strong> <em>dâshtan</em> normally means "to have" — but in this construction it means "to be in the middle of." Context makes it clear!</div>`,
exercises:[
  mc("'I am going' in Farsi:","dâram miravam",["miravam","dâram raftan","dâshtam miravam"]),
  mc("'She is reading' in Farsi:","dârad mikhânad",["mikhânad","dârad khândan","dârad mikhânid"]),
  fill("'We are doing' = dârim mi___im","kon","","dârim mikonim"),
  mc("'I was eating' in Farsi:","dâshtam mikhordam",["dâram mikhordam","dâshtam khordam","mikhordam"]),
  fill("'They are coming' = dârand mi___and","ây","","dârand miâyand"),
  mc("Progressive is formed with:","dâshtan + present tense verb",["mi- prefix alone","bâyad + verb","be- + stem"]),
  fill("'You are not going' = na___i miravi","dâr","","nadâri miravi"),
]},

{name:"18. Present Perfect",
lesson:`<p>✅ <strong>"I have done" in Farsi is elegant:</strong> take the past stem, add <em>-e</em> to get the past participle, then glue on tiny enclitic forms of "to be."</p>
<div class="conj">  Step 1 — Past Participle  =  past stem  +  -e:
    raft → rafte    kard → karde    did → dide
    khând → khânde   âmad → âmade

  Step 2 — Add enclitics (-am, -i, -e/-ast, -im, -id, -and):
    rafte-am   = I have gone
    karde-i    = you have done
    dide       = he/she has seen    (or dide-ast)
    rafte-im   = we have gone
    dide-and   = they have seen</div>
<div class="tip">💡 <strong>Negative:</strong> Just add <em>na-</em> before the participle: <em>narafte-am</em> = I have not gone.</div>
<div class="fun">😊 <strong>Great news:</strong> The past participle (stem + -e) also shows up in past perfect, passive voice, and conditionals. Learn it once, use it everywhere!</div>`,
exercises:[
  mc("Past participle of 'raftan' (to go):","rafte",["raft","raftan","rafter"]),
  mc("'I have gone' in Farsi:","rafte-am",["raftam","miravad","beravad"]),
  fill("'She has done' = karde-___","ast","3rd person singular; plain 'karde' is also fine"),
  mc("'We have read' in Farsi:","khânde-im",["khândam","mikhânim","khânde-and"]),
  fill("Past participle of 'didan' (to see) = ___","dide"),
  mc("'I have not come' = ?","nayâmade-am",["namiâyam","nayâmadam","nabiyâyam"]),
  fill("'They have seen' = dide-___","and"),
]},

{name:"19. Past Perfect",
lesson:`<p>⏪ <strong>"I had done" = past participle + past 'to be'.</strong> This tense describes something that was already completed before another past event. Think of it as the "flashback" tense.</p>
<div class="conj">  Formula: past participle  +  past of budan

  rafte budam   = I had gone        karde budi    = you had done
  dide bud      = he/she had seen   khânde budim  = we had read
  rafte budid   = you (pl.) had gone   karde budand  = they had done</div>
<div class="eg">vaghti âmadam, Ali rafte bud.
= When I arrived, Ali had already gone.  (past perfect!)</div>
<div class="tip">💡 <strong>The pattern is delightfully logical:</strong>
  Present perfect = participle + present "to be"  (rafte-am)
  Past perfect    = participle + past "to be"    (rafte budam)
  Just swap the tense of "to be" and you shift the whole thing back.</div>
<div class="tip">💡 <strong>Negative:</strong> na- before the participle: <em>narafte budam</em> = I had not gone.</div>`,
exercises:[
  mc("'I had gone' in Farsi:","rafte budam",["raftam","rafte-am","bude raftam"]),
  mc("'She had read' in Farsi:","khânde bud",["khând","khânde-ast","khândam"]),
  fill("'We had done' = karde ___im","bud","","karde budim"),
  mc("'They had seen' in Farsi:","dide budand",["dide-and","did budand","dide budan"]),
  fill("'You had not gone' = na___ budi","rafte"),
  mc("Past perfect describes:","an action completed before another past event",["a current action","a future action","a habitual action"]),
  fill("'He had come' = âmade ___","bud","","âmade bud"),
]},

{name:"20. Passive Voice",
lesson:`<p>🔄 <strong>Passive voice in Farsi is beautifully literal:</strong> it uses <em>shodan</em> (to become), so the passive is literally "the book became-read." Logical and elegant.</p>
<div class="conj">  Formula: past participle  +  shodan (conjugated)

  xânde mishavad     = it is being read       (present passive)
  xânde shod         = it was read            (past passive)
  xânde khâhad shod  = it will be read        (future passive)
  xânde shode-ast    = it has been read       (perfect passive)</div>
<div class="tip">💡 <strong>shodan — past forms:</strong> shodam, shodi, <strong>shod</strong>, shodim, shodid, shodand</div>
<div class="eg">dar bâz shod.                           = The door was opened.
ketâb be vasile-ye Ali xânde shod.     = The book was read by Ali.</div>
<div class="fun">🌟 <strong>Agent:</strong> To say "by whom", use <em>be vasile-ye</em> (literally "by means of") + noun. It's a bit wordy but unmistakably clear!</div>`,
exercises:[
  mc("'The door was opened' = ?","dar bâz shod",["dar bâz kard","dar bâz mishod","dar bâz konad"]),
  fill("'It is written' = neveshte mi___ad","shav","","neveshte mishavad"),
  mc("'The book will be read' = ?","ketâb xânde khâhad shod",["ketâb xânde mishavad","ketâb xânde shod","ketâb xânde bud"]),
  fill("Passive voice uses past participle + ___","shodan"),
  mc("'By Ali' (agent) in Farsi:","be vasile-ye Ali",["az Ali","bâ Ali","barâye Ali"]),
  fill("'It has been done' = karde shode-___","ast"),
  mc("Passive in Farsi uses:","past participle + shodan",["past participle + kardan","mi- + past stem","be- + stem + shodan"]),
]},

{name:"21. Question Formation",
lesson:`<p>❓ <strong>Forming questions in Farsi is easier than in English</strong> — you don't rearrange the word order or add 'do/does/did'. The verb stays at the end!</p>
<div class="conj">  Yes/No questions — two ways:
  1. Add âyâ at the start (formal/written):
       âyâ miâyi?    = Are you coming?
  2. Rising intonation — same sentence, different melody:
       miâyi?         = Are you coming?  ↗</div>
<div class="conj">  Question words (WH-questions):
  chi / che  = what    ki      = who      kojâ    = where
  key        = when    cheghadr = how much  chetour = how
  cherâ      = why     chand   = how many</div>
<div class="eg">Ali kojâ raft?     = Where did Ali go?   (Ali | where | went?)
chi khândi?        = What did you read?
cherâ nayâmadi?    = Why didn't you come?</div>
<div class="fun">🎯 <strong>Word order stays SOV even in questions!</strong> The question word usually goes where the unknown element would be — and the verb still sits at the end. Consistent and predictable.</div>`,
exercises:[
  mc("'Where did Ali go?':","Ali kojâ raft?",["kojâ Ali raft?","Ali raft kojâ?","kojâ raft Ali?"]),
  mc("'What did you read?':","chi khândi?",["chi mikhâni?","che khândid?","chi khândam?"]),
  fill("'Why didn't you come?' = ___ nayâmadi?","cherâ"),
  mc("Yes/no questions can be formed with:","âyâ at start OR rising intonation",["only âyâ","only rising intonation","a special verb suffix"]),
  fill("'Who came?' = ___ âmad?","ki"),
  mc("'How much does it cost?':","cheghadr ast?",["chetour ast?","cherâ ast?","chand ast?"]),
  fill("'When will you come?' = ___ miâyi?","key"),
]},

{name:"22. Compound Verbs",
lesson:`<p>🧩 <strong>Compound verbs are the heart of Farsi.</strong> Instead of creating new single words, Farsi combines a noun or adjective with a small set of "light verbs." This is also how Farsi absorbs foreign words!</p>
<div class="conj">  + kardan (to do / make):
    kâr kardan      = to work         telefon kardan = to call
    tamiz kardan    = to clean        hess kardan    = to feel

  + shodan (to become):
    xaste shodan    = to get tired    gom shodan     = to get lost
    âsheq shodan   = to fall in love  xoshhal shodan = to become happy

  + dâshtan (states/feelings):
    dust dâshtan    = to like / love  yâd dâshtan    = to remember

  + zadan (to hit — idiomatic):
    harf zadan      = to speak        dam zadan      = to rest</div>
<div class="warn">⚠️ <strong>Negation goes on the LIGHT VERB only:</strong>
  kâr ne-mikonam  ✅  (I'm not working)
  nakâr mikonam   ❌  (WRONG)</div>
<div class="fun">🌐 <strong>The secret to Farsi vocabulary growth:</strong> Once you know the light verbs, you can make a new compound verb from almost any noun — including borrowed words like <em>kopi kardan</em> (to copy) or <em>download kardan</em> (to download)!</div>`,
exercises:[
  mc("'to work' in Farsi:","kâr kardan",["kâr budan","kâr shodan","kâr zadan"]),
  mc("'to get tired' in Farsi:","xaste shodan",["xaste kardan","xaste dâshtan","xaste budan"]),
  fill("'to speak' = harf ___","zadan"),
  mc("'I like/love him' in Farsi:","u râ dust dâram",["u râ dust mikonam","u râ dust misham","u dust dâshtam"]),
  fill("'I am not working' = kâr ne___am","mikonam","","kâr nemikonam — negation goes on the light verb"),
  mc("'to call (by phone)' in Farsi:","telefon kardan",["telefon zadan","telefon shodan","telefon dâshtan"]),
  fill("'to get lost' = gom ___","shodan"),
]},

{name:"23. Relative Clauses",
lesson:`<p>🔗 <strong>One little word — ke — does all the heavy lifting.</strong> It translates as "that", "who", or "which", and it's one of the most-used words in spoken Farsi.</p>
<div class="conj">  mard-i  ke âmad         = the man who came
  ketâb-i ke khândam      = the book that I read
  zan-i   ke dust dâram   = the woman whom I like
  chizi   ke goftam       = the thing that I said</div>
<div class="tip">💡 <strong>The -i suffix:</strong> The noun before <em>ke</em> often takes an <em>-i</em> ending (indefiniteness marker). Think of it as "a man — the one who came."</div>
<div class="tip">💡 <strong>ke also introduces complement clauses</strong> (like English "that"):
  fekr mikonam ke raft.   = I think that he went.
  mibinam ke miâyi.       = I see that you are coming.</div>
<div class="warn">⚠️ <strong>The verb in the relative clause stays at the end</strong> of that clause — SOV applies inside the clause too!</div>`,
exercises:[
  mc("'the man who came':","mard-i ke âmad",["mard ke âmad","mard âmad ke","ke mard âmad"]),
  fill("'the book that I read' = ketâb-i ___ khândam","ke"),
  mc("'ke' in relative clauses means:","that / who / which",["and","but","because"]),
  fill("'I think that...' = fekr mikonam ___...","ke"),
  mc("'the woman I like' = ?","zan-i ke dust dâram",["zan ke dâram dust","zan-i dust dâram ke","ke zan-i dust dâram"]),
  fill("The antecedent in a relative clause often takes suffix: ___","-i"),
  mc("Where does the relative clause go?","immediately after the noun it modifies",["at the start of the sentence","at the end of the sentence","before the subject"]),
]},

{name:"24. Conditional Sentences",
lesson:`<p>🌈 <strong>Three types of conditional, each for a different level of reality.</strong> Think of them as three rungs on a ladder from possible → unlikely → impossible.</p>
<div class="conj">  🟢 REAL / POSSIBLE  (agar + subjunctive → present/future):
     agar biyâyi, khoshhâl misham.
     = If you come, I'll be happy.   (realistic, might actually happen)

  🟡 UNREAL PRESENT  (agar + past → result + -i ending):
     agar miâmadi, khoshhâl mishodi.
     = If you came, I'd be happy.    (hypothetical, probably won't happen)

  🔴 PAST UNREAL  (agar + past perfect → past conditional):
     agar âmade budi, khoshhâl shode budam.
     = If you had come, I'd have been happy.  (impossible — didn't happen)</div>
<div class="tip">💡 <strong>Memory ladder:</strong>
  Can happen → subjunctive (be- form)
  Won't happen → past tense in the condition
  Didn't happen → past perfect in the condition</div>
<div class="fun">🎭 <strong>Poetic Farsi:</strong> Persian poetry is full of past-unreal conditionals expressing longing and regret. The great poet Hafez built entire ghazals around this structure!</div>`,
exercises:[
  mc("'If you come, I'll be happy' uses:","agar + subjunctive",["agar + past tense","agar + future khâham","agar + imperative"]),
  fill("'if' in Farsi = ___","agar"),
  mc("'agar miâmadi, khoshhâl mishodi' expresses:","an unreal/hypothetical present condition",["a real future condition","a past fact","a command"]),
  fill("'If you had come…' = agar âmade ___, khoshhâl shode budam","budi"),
  mc("Real/possible conditions use which mood?","subjunctive",["imperative","plain past tense","future tense"]),
  fill("Past unreal conditionals: agar + ___ perfect","past"),
  mc("'agar nemiâyi, namiram' means:","if you don't come, I won't go",["if you came, I went","if you will come, go","come or I won't go"]),
]},

];

// ── Game Logic ────────────────────────────────────────────────

function goMenu(){S.screen='menu';render()}
function goTopics(){S.screen='topics';render()}
function goLesson(i){S.topicIdx=i;S.screen='lesson';render()}

function startStudy(){
  S.mode='study';
  S.exercises=shuffle([...TOPICS[S.topicIdx].exercises]);
  S.exIdx=0;S.score=0;beginExercise();
}

function startPractice(){
  S.mode='practice';
  const weak=TOPICS.filter(t=>(progress[t.name]||{}).last<80||(progress[t.name]||{}).last===undefined);
  const pool=weak.length?weak:TOPICS;
  let exs=[];pool.forEach(t=>t.exercises.forEach(e=>exs.push(e)));
  S.exercises=shuffle(exs).slice(0,12);
  S.topicIdx=-1;S.exIdx=0;S.score=0;beginExercise();
}

function beginExercise(){
  const ex=S.exercises[S.exIdx];
  S.answered=false;S.correct=false;S.chosenMC='';S.fillVal='';
  if(ex.kind==='mc')S.choices=shuffle([...ex.choices]);
  if(ex.kind==='scr'){S.pool=shuffle(ex.answer.split(' '));S.built=[];}
  S.screen='exercise';render();
}

function submitMC(chosen){
  if(S.answered)return;
  const ex=S.exercises[S.exIdx];
  S.chosenMC=chosen;S.correct=(chosen===ex.answer);
  if(S.correct)S.score++;S.answered=true;render();
}

function submitFill(){
  if(S.answered)return;
  const ex=S.exercises[S.exIdx];
  const val=document.getElementById('fill-in').value.trim();
  S.fillVal=val;S.correct=normalize(val)===normalize(ex.answer);
  if(S.correct)S.score++;S.answered=true;render();
}

function scrClick(i,from){
  if(S.answered)return;
  if(from==='pool'){S.built.push(S.pool.splice(i,1)[0]);}
  else{S.pool.push(S.built.splice(i,1)[0]);}
  render();
}

function submitScr(){
  if(S.answered)return;
  const ex=S.exercises[S.exIdx];
  S.correct=normalize(S.built.join(' '))===normalize(ex.answer);
  if(S.correct)S.score++;S.answered=true;render();
}

function nextEx(){
  S.exIdx++;
  if(S.exIdx>=S.exercises.length)finishSession();
  else beginExercise();
}

function finishSession(){
  if(S.mode==='study'){
    const t=TOPICS[S.topicIdx];
    const pct=Math.round(100*S.score/S.exercises.length);
    const rec=progress[t.name]||{attempts:0,best:0,last:0};
    rec.attempts=(rec.attempts||0)+1;rec.best=Math.max(rec.best||0,pct);rec.last=pct;
    progress[t.name]=rec;saveProgress();
  }
  S.screen='results';render();
}

// ── Render ────────────────────────────────────────────────────

function render(){
  const app=document.getElementById('app');
  if(S.screen==='menu')    app.innerHTML=rMenu();
  if(S.screen==='topics')  app.innerHTML=rTopics();
  if(S.screen==='lesson')  app.innerHTML=rLesson();
  if(S.screen==='exercise')app.innerHTML=rExercise();
  if(S.screen==='results') app.innerHTML=rResults();
  if(S.screen==='prog')    app.innerHTML=rProg();
  bind();
}

function rMenu(){
  const done=TOPICS.filter(t=>progress[t.name]).length;
  const mastered=TOPICS.filter(t=>(progress[t.name]||{}).best>=80).length;
  const pct=Math.round(100*done/TOPICS.length);
  return`<div class="hdr"><h1>Farsi Grammar Master</h1><div class="sub">یادگیری دستور زبان فارسی</div></div>
  <div class="card">
    <div class="stats">
      <div class="stat"><div class="stat-n">${done}/${TOPICS.length}</div><div class="stat-l">Topics Studied</div></div>
      <div class="stat"><div class="stat-n">${mastered}</div><div class="stat-l">Mastered (≥80%)</div></div>
    </div>
    <div class="section-title">Overall Progress</div>
    <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
    <button class="btn btn-primary btn-block" onclick="goTopics()">📖  Study a Topic</button>
    <button class="btn btn-secondary btn-block" onclick="startPractice()">🎯  Practice Weak Areas</button>
    <button class="btn btn-secondary btn-block" onclick="S.screen='prog';render()">📊  View Progress</button>
  </div>`;
}

function rTopics(){
  const rows=TOPICS.map((t,i)=>{
    const rec=progress[t.name]||{};const best=rec.best!=null?rec.best:-1;
    let badge,cls='';
    if(best<0)badge=`<span class="badge badge-new">new</span>`;
    else if(best>=80){badge=`<span class="badge badge-great">★ ${best}%</span>`;cls='mastered';}
    else badge=`<span class="badge badge-ok">${best}%</span>`;
    return`<div class="topic-row ${cls}" onclick="goLesson(${i})"><span class="topic-name">${esc(t.name)}</span>${badge}</div>`;
  }).join('');
  return`<div class="hdr"><h1>Select a Topic</h1></div>
  <button class="back-btn" onclick="goMenu()">← Back</button>
  <div class="card">${rows}</div>`;
}

function rLesson(){
  const t=TOPICS[S.topicIdx];
  const rec=progress[t.name]||{};
  return`<div class="hdr"><h1>${esc(t.name)}</h1></div>
  <button class="back-btn" onclick="goTopics()">← Back to Topics</button>
  <div class="card">
    <div class="lesson-body">${t.lesson}</div>
    <button class="btn btn-primary btn-block" onclick="startStudy()" style="margin-top:16px">Start Exercises →</button>
    ${rec.best!=null?`<div style="text-align:center;margin-top:10px;font-size:.82rem;color:#888">Best: ${rec.best}% · Attempts: ${rec.attempts||0}</div>`:''}
  </div>`;
}

function rExercise(){
  const ex=S.exercises[S.exIdx];
  const total=S.exercises.length;
  const pct=Math.round(100*S.exIdx/total);
  const typeLabel={mc:'Multiple Choice',fill:'Fill in the Blank',scr:'Unscramble'}[ex.kind];
  const typeCls={mc:'ex-mc',fill:'ex-fill',scr:'ex-scr'}[ex.kind];
  let inputHtml='';
  if(ex.kind==='mc'){
    inputHtml=S.choices.map(c=>{
      let cls='choice';
      if(S.answered){if(c===ex.answer)cls+=' correct';else if(c===S.chosenMC)cls+=' wrong';}
      return`<button class="${cls}" ${S.answered?'disabled':''} onclick="submitMC('${esc(c)}')">${esc(c)}</button>`;
    }).join('');
  }else if(ex.kind==='fill'){
    const cls=S.answered?(S.correct?'correct':'wrong'):'';
    inputHtml=`<input class="fill-input ${cls}" id="fill-in" type="text" placeholder="Type your answer…"
      ${S.answered?`disabled value="${esc(S.fillVal)}"`:''} onkeydown="if(event.key==='Enter'&&!${S.answered})submitFill()">
      ${!S.answered?`<button class="btn btn-primary" style="margin-top:10px;width:100%" onclick="submitFill()">Submit</button>`:''}`;
  }else{
    const poolHtml=S.pool.map((w,i)=>`<span class="chip chip-pool" onclick="scrClick(${i},'pool')">${esc(w)}</span>`).join('');
    const builtHtml=S.built.map((w,i)=>`<span class="chip chip-built" onclick="scrClick(${i},'built')">${esc(w)}</span>`).join('');
    inputHtml=`<div class="scr-label">Word Pool — click to add</div>
      <div class="chips">${poolHtml||'<span style="color:#ccc;font-size:.85rem">all words placed</span>'}</div>
      <hr class="scr-divider">
      <div class="scr-label">Your Answer — click to remove</div>
      <div class="chips">${builtHtml||'<span style="color:#ccc;font-size:.85rem">tap words above</span>'}</div>
      ${!S.answered?`<button class="btn btn-primary" style="margin-top:10px;width:100%" onclick="submitScr()" ${S.built.length===0?'disabled':''}>Submit</button>`:''}`;
  }
  const feedbackHtml=S.answered?`<div class="feedback ${S.correct?'ok':'bad'}">
    <div class="feedback-title">${S.correct?'✓ Correct!':'✗ Not quite.'}</div>
    ${!S.correct?`<div class="feedback-answer">Answer: <strong>${esc(ex.answer)}</strong></div>`:''}
    ${ex.expl?`<div class="feedback-expl">${esc(ex.expl)}</div>`:''}
  </div>
  <button class="btn btn-primary" style="margin-top:12px;width:100%" onclick="nextEx()">
    ${S.exIdx+1<total?'Next Question →':'See Results →'}</button>`:'';
  const topicLabel=S.mode==='practice'?'Practice Mode':esc(TOPICS[S.topicIdx]?.name||'');
  return`<div class="hdr"><h1>${topicLabel}</h1></div>
  <div class="card">
    <div class="q-counter">Question ${S.exIdx+1} of ${total} · Score: ${S.score}</div>
    <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
    <span class="ex-type ${typeCls}">${typeLabel}</span>
    <div class="ex-prompt">${esc(ex.prompt).replace(/\n/g,'<br>')}</div>
    ${ex.hint?`<div class="ex-hint">💡 ${esc(ex.hint)}</div>`:''}
    ${inputHtml}${feedbackHtml}
  </div>`;
}

function rResults(){
  const total=S.exercises.length;
  const pct=Math.round(100*S.score/total);
  let msg,color;
  if(pct===100){msg='🏆 Perfect score! Flawless mastery.';color='#2e7d32';}
  else if(pct>=80){msg='🎉 Great job! You have a solid grasp of this.';color='#1565c0';}
  else if(pct>=60){msg='💪 Good effort — review the lesson and try again.';color='#e65100';}
  else{msg='📖 Keep studying — re-read the lesson first, then retry.';color='#c62828';}
  return`<div class="hdr"><h1>Results</h1></div>
  <div class="card" style="text-align:center">
    <div class="result-circle"><div class="result-pct">${pct}%</div><div class="result-frac">${S.score} / ${total}</div></div>
    <div class="result-msg" style="color:${color}"><strong>${msg}</strong></div>
    <div class="btn-row" style="justify-content:center">
      ${S.mode==='study'?`<button class="btn btn-secondary" onclick="startStudy()">Try Again</button>
      <button class="btn btn-secondary" onclick="goLesson(${S.topicIdx})">Back to Lesson</button>`:''}
      <button class="btn btn-primary" onclick="goMenu()">Main Menu</button>
    </div>
  </div>`;
}

function rProg(){
  const rows=TOPICS.map(t=>{
    const rec=progress[t.name];
    if(!rec)return`<div class="prog-row"><div class="prog-row-name">${esc(t.name)}</div><div class="prog-meta">Not yet studied</div></div>`;
    const best=rec.best||0;
    const barColor=best>=80?'#f9a825':best>=60?'#1565c0':'#c62828';
    return`<div class="prog-row"><div class="prog-row-name">${esc(t.name)} ${best>=80?'★':''}</div>
      <div class="mini-bar-wrap"><div class="mini-bar" style="width:${best}%;background:${barColor}"></div></div>
      <div class="prog-meta">Best: ${best}% · Last: ${rec.last||0}% · Attempts: ${rec.attempts||0}</div></div>`;
  }).join('');
  const mastered=TOPICS.filter(t=>(progress[t.name]||{}).best>=80).length;
  return`<div class="hdr"><h1>Your Progress</h1></div>
  <button class="back-btn" onclick="goMenu()">← Back</button>
  <div class="card">
    <div class="stats">
      <div class="stat"><div class="stat-n">${mastered}</div><div class="stat-l">Mastered (≥80%)</div></div>
      <div class="stat"><div class="stat-n">${TOPICS.filter(t=>progress[t.name]).length}/${TOPICS.length}</div><div class="stat-l">Studied</div></div>
    </div>${rows}</div>`;
}

function bind(){const fi=document.getElementById('fill-in');if(fi&&!S.answered)fi.focus();}

render();
</script>
